name: Run Monte Carlo Simulation

on:
  workflow_dispatch:

jobs:
  simulate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify model exists
        run: |
          ls -lh models/
          test -f models/goals_model.pkl

      - name: Run Monte Carlo World Cup simulation
        run: |
          echo "=== Starting Monte Carlo simulation ==="
          python monte_carlo_world_cup.py
          echo "=== Completed Monte Carlo simulation ==="

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push results
        run: |
          git add results/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Auto-generated: Updated simulation results"

            git pull --rebase origin main || git pull --rebase

            git push
          fi