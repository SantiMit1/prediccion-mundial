name: Build Dataset
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build enriched dataset
        run: |
          echo "=== Starting dataset build ==="
          python src/build_enriched_dataset.py
          echo "=== Completed dataset build ==="

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push results
        run: |
          git add data/enriched_dataset.csv

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Auto-generated: Updated enriched dataset"

            git pull --rebase origin main || git pull --rebase

            git push
          fi